<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的课程表</title>
  <link rel="icon" href="assets/icon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="style.css?v=edit-course">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Kafu Course Table</p>
        <h1>我的课程表</h1>
      </div>
      <div class="header-actions" aria-label="课程表操作">
        <button class="ghost-button" id="open-course-query" type="button">查询科目时间</button>
        <button class="primary-button" id="open-day-query" type="button">查询当日行程</button>
      </div>
    </header>

    <section class="week-panel" aria-label="本周课程表">
      <div class="schedule-board">
        <div class="week-title">
          <button class="week-step" id="week-prev" type="button" aria-label="上一周">‹</button>
          <span id="current-week-label">第 11 周</span>
          <button class="week-step" id="week-next" type="button" aria-label="下一周">›</button>
        </div>
        <div class="weekday-row" id="weekday-row"></div>
        <div class="schedule-grid" id="schedule-grid"></div>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="course-modal" hidden>
    <section class="course-editor" role="dialog" aria-modal="true" aria-labelledby="course-editor-title">
      <header class="modal-header">
        <button class="text-button" id="course-cancel" type="button">取消</button>
        <h2 id="course-editor-title">添加课程</h2>
        <button class="text-button accent" id="course-done" type="button">完成</button>
      </header>

      <form class="course-form">
        <label class="form-row">
          <span>课程名称</span>
          <input id="course-name" type="text" placeholder="请输入课程名称" autocomplete="off">
        </label>

        <button class="form-row link-row" id="open-week-picker" type="button">
          <span>课程周期</span>
          <strong id="week-summary">第 1-16 周</strong>
        </button>

        <label class="form-row">
          <span>教室地点</span>
          <input id="course-room" type="text" placeholder="请输入教室地点" autocomplete="off">
        </label>

        <label class="form-row">
          <span>任课老师</span>
          <input id="course-teacher" type="text" placeholder="请输入任课老师" autocomplete="off">
        </label>
      </form>
    </section>
  </div>

  <div class="modal-backdrop" id="week-modal" hidden>
    <section class="week-picker" role="dialog" aria-modal="true" aria-labelledby="week-picker-title">
      <header class="modal-header">
        <button class="text-button" id="week-cancel" type="button">取消</button>
        <h2 id="week-picker-title">周数</h2>
        <button class="text-button accent" id="week-done" type="button">完成</button>
      </header>

      <div class="week-mode-group" aria-label="周数选择模式">
        <button class="week-mode" data-mode="odd" type="button"><span></span>单周</button>
        <button class="week-mode" data-mode="even" type="button"><span></span>双周</button>
        <button class="week-mode is-selected" data-mode="all" type="button"><span></span>全选</button>
      </div>

      <div class="week-grid" id="week-grid" aria-label="周数列表"></div>
    </section>
  </div>

  <div class="modal-backdrop" id="course-query-modal" hidden>
    <section class="course-editor query-panel" role="dialog" aria-modal="true" aria-labelledby="course-query-title">
      <header class="modal-header">
        <button class="text-button" id="course-query-cancel" type="button">取消</button>
        <h2 id="course-query-title">查询科目时间</h2>
        <button class="text-button accent" id="course-query-submit" type="button">查询</button>
      </header>

      <form class="course-form query-form">
        <label class="form-row">
          <span>课程名称</span>
          <input id="course-query-name" type="text" placeholder="请输入要查询的课程名称" autocomplete="off">
        </label>
      </form>

      <div class="query-results" id="course-query-results" aria-live="polite"></div>
    </section>
  </div>

  <div class="modal-backdrop" id="day-query-modal" hidden>
    <section class="course-editor query-panel day-query-panel" role="dialog" aria-modal="true" aria-labelledby="day-query-title">
      <header class="modal-header">
        <button class="text-button" id="day-query-cancel" type="button">取消</button>
        <h2 id="day-query-title">查询当日行程</h2>
        <button class="text-button accent" id="day-query-submit" type="button">查询</button>
      </header>

      <form class="course-form query-form">
        <div class="day-query-block">
          <div class="day-query-heading">
            <span>选择日期</span>
          </div>
          <div class="day-query-week-control" aria-label="选择查询周数">
            <button class="week-step day-query-week-step" id="day-query-week-prev" type="button" aria-label="上一周">‹</button>
            <strong id="day-query-week-label">第 11 周</strong>
            <button class="week-step day-query-week-step" id="day-query-week-next" type="button" aria-label="下一周">›</button>
          </div>
          <p class="day-query-date" id="day-query-date">星期六 · 5月9日</p>
          <div class="day-query-days" aria-label="选择星期">
            <button class="day-query-day" data-day="1" type="button">一</button>
            <button class="day-query-day" data-day="2" type="button">二</button>
            <button class="day-query-day" data-day="3" type="button">三</button>
            <button class="day-query-day" data-day="4" type="button">四</button>
            <button class="day-query-day" data-day="5" type="button">五</button>
            <button class="day-query-day is-selected" data-day="6" type="button">六</button>
            <button class="day-query-day" data-day="7" type="button">日</button>
          </div>
        </div>
      </form>

      <div class="query-results" id="day-query-results" aria-live="polite"></div>
    </section>
  </div>

  <div class="modal-backdrop" id="delete-modal" hidden>
    <section class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="delete-title">
      <h2 id="delete-title">确认删除课程？</h2>
      <p id="delete-message">删除后该课程将从课程表中移除。</p>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="delete-cancel" type="button">取消</button>
        <button class="confirm-danger" id="delete-confirm" type="button">删除</button>
      </div>
    </section>
  </div>

  <script src="app.js?v=edit-course"></script>
</body>
</html>
