<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的课程表</title>
  <link rel="stylesheet" href="style.css?v=main-empty">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Kafu Course Table</p>
        <h1>我的课程表</h1>
      </div>
      <div class="header-actions" aria-label="课程表操作">
        <button class="ghost-button" type="button">查询</button>
        <button class="primary-button" type="button">添加课程</button>
      </div>
    </header>

    <section class="week-panel" aria-label="本周课程表">
      <div class="schedule-board">
        <div class="week-title">第 13 周</div>
        <div class="weekday-row" id="weekday-row"></div>
        <div class="schedule-grid" id="schedule-grid"></div>
      </div>
    </section>
  </main>

  <script src="app.js?v=main-empty"></script>
</body>
</html>
